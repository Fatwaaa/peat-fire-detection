<html lang="id">
<head>
<title>Peat Fire Detection – Riau Province</title>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden}
#map{height:100vh;width:100vw;position:fixed;top:0;left:0;z-index:1}

/* ── WELCOME BANNER ── selalu di tengah */
.welcome-banner{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.96);padding:7px 18px;
  border-radius:8px;box-shadow:0 3px 14px rgba(0,0,0,.25);
  z-index:1100;text-align:center;border-left:5px solid #e74c3c;
  white-space:nowrap;pointer-events:none;
}
.welcome-banner h1{font-size:14px;color:#2c3e50;font-weight:700}
.welcome-banner p{font-size:10px;color:#7f8c8d;margin-top:1px}

/* ── DESKTOP SIDEBAR ── */
.control-panel{
  position:fixed;top:10px;right:12px;
  background:rgba(255,255,255,.97);padding:15px;
  border-radius:10px;box-shadow:0 4px 18px rgba(0,0,0,.22);
  z-index:1000;width:255px;
}
.panel-handle{display:none}
.panel-body{display:block}

.panel-title{font-size:12px;font-weight:700;color:#2c3e50;
  border-bottom:2px solid #ecf0f1;padding-bottom:7px;margin-bottom:10px}
.counter{font-size:11px;color:#555;margin-bottom:10px;padding:5px 8px;
  background:#fef9f9;border-radius:5px;border-left:3px solid #e74c3c}
.counter b{color:#e74c3c}

/* Stats grid di dalam panel */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.stat-card{background:#f8f8f8;border-radius:5px;padding:5px 7px;text-align:center}
.stat-card .num{font-size:18px;font-weight:700;line-height:1.1}
.stat-card .lbl{font-size:9px;color:#666;margin-top:1px}
.stat-card.st{border-top:3px solid #8B0000}.stat-card.st .num{color:#8B0000}
.stat-card.ti{border-top:3px solid #e74c3c}.stat-card.ti .num{color:#e74c3c}
.stat-card.se{border-top:3px solid #e67e22}.stat-card.se .num{color:#e67e22}
.stat-card.re{border-top:3px solid #f1c40f}.stat-card.re .num{color:#e6b800}

.form-group{margin-bottom:9px}
.form-group label{display:block;font-size:10px;font-weight:700;color:#34495e;
  margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.form-control{width:100%;padding:6px 9px;border:1px solid #bdc3c7;
  border-radius:5px;font-size:12px;outline:none;transition:border .2s}
.form-control:focus{border-color:#e74c3c}
.btn-reset{width:100%;background:#e74c3c;color:white;border:none;
  padding:7px;border-radius:5px;cursor:pointer;font-weight:700;
  font-size:12px;margin-top:3px;transition:background .2s}
.btn-reset:hover{background:#c0392b}

/* Legend di dalam panel */
.legend-inline{margin-top:10px;padding-top:8px;border-top:1px solid #ecf0f1}
.legend-inline h4{font-size:10px;font-weight:700;color:#34495e;
  text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.legend-row{display:flex;gap:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#444}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Leaflet layer control - desktop */
.leaflet-top.leaflet-right{top:10px!important;right:278px!important}

/* ── MOBILE ── */
@media(max-width:600px){
  /* Banner: tengah, kecil, tidak menimpa zoom */
  .welcome-banner{
    top:8px;
    /* Geser sedikit ke kanan agar tidak tumpang tindih tombol zoom (width ~35px) */
    left:calc(50% + 22px);
    transform:translateX(-50%);
    padding:5px 12px;
    max-width:calc(100vw - 100px);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .welcome-banner h1{font-size:11px}
  .welcome-banner p{display:none}

  /* Stats grid: 4 kolom di mobile (lebih compact) */
  .stats-grid{grid-template-columns:1fr 1fr 1fr 1fr;gap:4px}
  .stat-card .num{font-size:14px}
  .stat-card .lbl{font-size:8px}

  /* Bottom sheet */
  .control-panel{
    top:auto;right:0;bottom:0;left:0;width:100%;
    border-radius:14px 14px 0 0;padding:0;
    max-height:50px;overflow:hidden;
    transition:max-height .3s ease;
    box-shadow:0 -3px 18px rgba(0,0,0,.2);
  }
  .control-panel.open{max-height:90vh;overflow-y:auto}

  .panel-handle{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;cursor:pointer;user-select:none;
  }
  .panel-handle-title{font-size:13px;font-weight:700;color:#2c3e50;display:flex;align-items:center;gap:6px}
  .chevron{font-size:13px;color:#e74c3c;transition:transform .25s}
  .control-panel.open .chevron{transform:rotate(180deg)}

  .panel-body{padding:0 14px 20px}
  .panel-title{display:none}

  /* Layer control: geser agar tidak ketutup banner */
  .leaflet-top.leaflet-right{top:52px!important;right:8px!important}

  /* Zoom control: di bawah banner */
  .leaflet-top.leaflet-left{top:52px!important;left:8px!important}
}
</style>
</head>

  const colorMap = {
    "Sangat Tinggi":"#8B0000","Tinggi":"#e74c3c","Sedang":"#e67e22","Rendah":"#f1c40f"
  };
  let markersLayer = [];

  function makeIcon(color){
    return L.divIcon({
      html:`<div style="background:${color};width:20px;height:20px;border-radius:50% 50% 50% 0;
              transform:rotate(-45deg);border:2px solid white;
              box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>`,
      className:'',iconSize:[20,20],iconAnchor:[10,20],popupAnchor:[0,-22]
    });
  }

  function renderMarkers(data){
    markersLayer.forEach(m=>map.removeLayer(m));
    markersLayer=[];
    const c={"Sangat Tinggi":0,"Tinggi":0,"Sedang":0,"Rendah":0};
    data.forEach(item=>{
      const col=colorMap[item.tingkat]||"#e74c3c";
      c[item.tingkat]=(c[item.tingkat]||0)+1;
      const popup=`<div style="font-family:Segoe UI,Arial;width:210px;">
        <div style="background:${col};color:#fff;padding:7px 10px;border-radius:4px 4px 0 0;margin:-8px -8px 8px -8px;">
          <b><i class="fa-solid fa-fire"></i>&nbsp;Kebakaran Terdeteksi AI</b></div>
        <table style="width:100%;font-size:12px;border-collapse:collapse;">
          <tr style="border-bottom:1px solid #eee"><td style="padding:3px 4px;color:#777">Kabupaten</td><td style="padding:3px 4px;font-weight:700">${item.wilayah}</td></tr>
          <tr style="border-bottom:1px solid #eee"><td style="padding:3px 4px;color:#777">Desa/Kec.</td><td style="padding:3px 4px">${item.desa}</td></tr>
          <tr style="border-bottom:1px solid #eee"><td style="padding:3px 4px;color:#777">Est. Luas</td><td style="padding:3px 4px;font-weight:700;color:#e74c3c">${item.luas}</td></tr>
          <tr style="border-bottom:1px solid #eee"><td style="padding:3px 4px;color:#777">Keparahan</td>
            <td style="padding:3px 4px"><span style="background:${col};color:#fff;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700">${item.tingkat}</span></td></tr>
          <tr><td style="padding:3px 4px;color:#777">Koordinat</td><td style="padding:3px 4px;font-size:10px">${item.lat.toFixed(4)}, ${item.lon.toFixed(4)}</td></tr>
        </table></div>`;
      const m=L.marker([item.lat,item.lon],{icon:makeIcon(col)}).bindPopup(popup,{maxWidth:230});
      m.addTo(map); markersLayer.push(m);
    });
    const total=data.length;
    document.getElementById('cntShow').textContent=total;
    document.getElementById('handleCount').textContent=`(${total} titik)`;
    document.getElementById('statST').textContent=c["Sangat Tinggi"]||0;
    document.getElementById('statTI').textContent=c["Tinggi"]||0;
    document.getElementById('statSE').textContent=c["Sedang"]||0;
    document.getElementById('statRE').textContent=c["Rendah"]||0;
  }

  function filterData(){
    const s=document.getElementById('searchLocation').value.toLowerCase();
    const k=document.getElementById('filterKabupaten').value;
    const t=document.getElementById('filterTingkat').value;
    const filtered=hotspotData.filter(item=>{
      const ms=!s||item.wilayah.toLowerCase().includes(s)||item.desa.toLowerCase().includes(s);
      return ms&&(k==="ALL"||item.wilayah===k)&&(t==="ALL"||item.tingkat===t);
    });
    renderMarkers(filtered);
    if(filtered.length>0){
      map.fitBounds(L.latLngBounds(filtered.map(d=>[d.lat,d.lon])),{padding:[60,60]});
    }
  }

  function resetFilter(){
    document.getElementById('searchLocation').value='';
    document.getElementById('filterKabupaten').value='ALL';
    document.getElementById('filterTingkat').value='ALL';
    renderMarkers(hotspotData);
    map.setView([0.50,101.90],8);
  }

  function togglePanel(){
    const p=document.getElementById('controlPanel');
    p.classList.toggle('open');
  }

  // Desktop: pastikan panel selalu terlihat penuh
  function applyDesktop(){
    const p=document.getElementById('controlPanel');
    if(window.innerWidth>600){
      p.classList.remove('open');
      p.style.maxHeight='';
      p.style.overflow='';
    }
  }
  applyDesktop();
  window.addEventListener('resize',applyDesktop);

  renderMarkers(hotspotData);
</script>
