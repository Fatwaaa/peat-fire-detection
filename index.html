<style>

  body{font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden}
  #map{height:100vh;width:100vw;position:fixed;top:0;left:0;z-index:1}

  /* ── WELCOME BANNER ── */
  .welcome-banner{
    position:fixed;top:12px;left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,.96);padding:8px 20px;
    border-radius:8px;box-shadow:0 3px 14px rgba(0,0,0,.22);
    z-index:1000;text-align:center;border-left:5px solid #e74c3c;
    white-space:nowrap;max-width:90vw;
  }
  .welcome-banner h1{font-size:15px;color:#2c3e50;font-weight:700}
  .welcome-banner p{font-size:10px;color:#7f8c8d;margin-top:2px}

  /* ── DESKTOP SIDEBAR ── */
  .control-panel{
    position:fixed;top:12px;right:12px;
    background:rgba(255,255,255,.97);padding:16px;
    border-radius:10px;box-shadow:0 4px 18px rgba(0,0,0,.22);
    z-index:1000;width:260px;
  }
  .control-panel h3{font-size:12px;font-weight:700;color:#2c3e50;
    border-bottom:2px solid #ecf0f1;padding-bottom:7px;margin-bottom:11px}
  .counter{font-size:11px;color:#555;margin-bottom:10px;padding:5px 8px;
    background:#fef9f9;border-radius:5px;border-left:3px solid #e74c3c}
  .counter b{color:#e74c3c}
  .form-group{margin-bottom:10px}
  .form-group label{display:block;font-size:10px;font-weight:700;color:#34495e;
    margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
  .form-control{width:100%;padding:6px 9px;border:1px solid #bdc3c7;
    border-radius:5px;font-size:12px;outline:none;transition:border .2s}
  .form-control:focus{border-color:#e74c3c}
  .btn-reset{width:100%;background:#e74c3c;color:white;border:none;
    padding:7px;border-radius:5px;cursor:pointer;font-weight:700;
    font-size:12px;margin-top:3px;transition:background .2s}
  .btn-reset:hover{background:#c0392b}

  /* ── LEGEND (desktop bottom-left) ── */
  .legend{
    position:fixed;bottom:70px;left:12px;
    background:rgba(255,255,255,.95);padding:10px 14px;
    border-radius:8px;box-shadow:0 3px 12px rgba(0,0,0,.18);
    z-index:1000;font-size:11px;
  }
  .legend h4{margin-bottom:6px;font-size:10px;color:#2c3e50;
    text-transform:uppercase;letter-spacing:.5px}
  .legend-item{display:flex;align-items:center;gap:6px;margin-bottom:3px}
  .legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}

  /* ── STATS BAR (desktop bottom center) ── */
  .stats-bar{
    position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,.95);padding:6px 18px;
    border-radius:30px;box-shadow:0 3px 12px rgba(0,0,0,.18);
    z-index:1000;display:flex;gap:18px;align-items:center;font-size:11px;color:#2c3e50;
  }
  .stat-item{text-align:center}
  .stat-item strong{display:block;font-size:17px;color:#e74c3c;line-height:1.1}

  /* ── MOBILE OVERRIDES (max-width: 600px) ── */
  @media(max-width:600px){
    .welcome-banner{
      top:8px;padding:6px 12px;max-width:calc(100vw - 100px);

    }
    .welcome-banner h1{font-size:12px}
    .welcome-banner p{display:none}

    .control-panel{
      top:auto;right:0;bottom:0;left:0;width:100%;
      border-radius:14px 14px 0 0;padding:0;
      transition:max-height .3s ease;overflow:hidden;
    }
    .control-panel.collapsed{max-height:44px}
    .control-panel.expanded{max-height:85vh;overflow-y:auto}
    .panel-handle{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 16px;cursor:pointer;background:#fff;
      border-radius:14px 14px 0 0;border-bottom:1px solid #ecf0f1;
    }
    .panel-handle span{font-size:13px;font-weight:700;color:#2c3e50}
    .panel-handle .chevron{font-size:14px;color:#e74c3c;transition:transform .2s}
    .panel-handle .chevron.up{transform:rotate(180deg)}
    .panel-body{padding:12px 16px 20px}

    /* Legend di atas panel */
    .legend{bottom:50px;left:8px;font-size:10px;padding:7px 10px}
    .legend h4{font-size:9px}

    /* Stats bar hilang di mobile (info di counter sudah cukup) */
    .stats-bar{display:none}
  }

  @media(min-width:601px){
    .panel-handle{display:none}
    .panel-body{display:contents}
  }

  @media(max-width:600px){
    .leaflet-top.leaflet-right{top:56px!important;right:8px!important}
    .leaflet-control-layers{font-size:12px}
  }
</style>

  const colorMap = {
    "Sangat Tinggi":"#8B0000","Tinggi":"#e74c3c",
    "Sedang":"#e67e22","Rendah":"#f1c40f"
  };
  let markersLayer = [];

  function makeIcon(color){
    return L.divIcon({
      html:`<div style="
        background:${color};width:20px;height:20px;
        border-radius:50% 50% 50% 0;transform:rotate(-45deg);
        border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.5);"></div>`,
      className:'',iconSize:[20,20],iconAnchor:[10,20],popupAnchor:[0,-22]
    });
  }

  function renderMarkers(data){
    markersLayer.forEach(m=>map.removeLayer(m));
    markersLayer=[];
    const c={"Sangat Tinggi":0,"Tinggi":0,"Sedang":0,"Rendah":0};

    data.forEach(item=>{
      const col=colorMap[item.tingkat]||"#e74c3c";
      c[item.tingkat]=(c[item.tingkat]||0)+1;
      const popup=`
        <div style="font-family:Segoe UI,Arial;width:210px;">
          <div style="background:${col};color:#fff;padding:7px 10px;
            border-radius:4px 4px 0 0;margin:-8px -8px 8px -8px;">
            <b style="font-size:13px;"><i class="fa-solid fa-fire"></i>&nbsp;Kebakaran Terdeteksi AI</b>
          </div>
          <table style="width:100%;font-size:12px;border-collapse:collapse;">
            <tr style="border-bottom:1px solid #eee">
              <td style="padding:3px 4px;color:#777">Kabupaten</td>
              <td style="padding:3px 4px;font-weight:700">${item.wilayah}</td>
            </tr>
            <tr style="border-bottom:1px solid #eee">
              <td style="padding:3px 4px;color:#777">Desa/Kec.</td>
              <td style="padding:3px 4px">${item.desa}</td>
            </tr>
            <tr style="border-bottom:1px solid #eee">
              <td style="padding:3px 4px;color:#777">Est. Luas</td>
              <td style="padding:3px 4px;font-weight:700;color:#e74c3c">${item.luas}</td>
            </tr>
            <tr style="border-bottom:1px solid #eee">
              <td style="padding:3px 4px;color:#777">Keparahan</td>
              <td style="padding:3px 4px">
                <span style="background:${col};color:#fff;padding:2px 7px;
                  border-radius:10px;font-size:10px;font-weight:700">${item.tingkat}</span>
              </td>
            </tr>
            <tr>
              <td style="padding:3px 4px;color:#777">Koordinat</td>
              <td style="padding:3px 4px;font-size:10px">${item.lat.toFixed(4)}, ${item.lon.toFixed(4)}</td>
            </tr>
          </table>
        </div>`;
      const m=L.marker([item.lat,item.lon],{icon:makeIcon(col)})
               .bindPopup(popup,{maxWidth:230});
      m.addTo(map);
      markersLayer.push(m);
    });

    // Update counter & stats
    document.getElementById('cntShow').textContent=data.length;
    document.getElementById('statTotal').textContent=data.length;
    document.getElementById('statST').textContent=c["Sangat Tinggi"]||0;
    document.getElementById('statTi').textContent=c["Tinggi"]||0;
    document.getElementById('statSe').textContent=c["Sedang"]||0;
    document.getElementById('statRe').textContent=c["Rendah"]||0;
  }

  function filterData(){
    const s=document.getElementById('searchLocation').value.toLowerCase();
    const k=document.getElementById('filterKabupaten').value;
    const t=document.getElementById('filterTingkat').value;
    const filtered=hotspotData.filter(item=>{
      const ms=!s||item.wilayah.toLowerCase().includes(s)||item.desa.toLowerCase().includes(s);
      const mk=k==="ALL"||item.wilayah===k;
      const mt=t==="ALL"||item.tingkat===t;
      return ms&&mk&&mt;
    });
    renderMarkers(filtered);
    if(filtered.length>0){
      const b=L.latLngBounds(filtered.map(d=>[d.lat,d.lon]));
      map.fitBounds(b,{padding:[60,60]});
    }
  }

  function resetFilter(){
    document.getElementById('searchLocation').value='';
    document.getElementById('filterKabupaten').value='ALL';
    document.getElementById('filterTingkat').value='ALL';
    renderMarkers(hotspotData);
    map.setView([0.50,101.90],8);
  }

  // ── Mobile panel toggle ──
  function togglePanel(){
    const p=document.getElementById('controlPanel');
    const chevron=document.getElementById('chevronIcon');
    if(p.classList.contains('collapsed')){
      p.classList.replace('collapsed','expanded');
      chevron.classList.add('up');
    }else{
      p.classList.replace('expanded','collapsed');
      chevron.classList.remove('up');
    }
  }

  // Desktop: panel selalu expanded
  function applyPanelState(){
    const p=document.getElementById('controlPanel');
    if(window.innerWidth>600){
      p.classList.remove('collapsed','expanded');
    }else if(!p.classList.contains('expanded')){
      p.classList.add('collapsed');
    }
  }
  applyPanelState();
  window.addEventListener('resize',applyPanelState);

  renderMarkers(hotspotData);
</script>
